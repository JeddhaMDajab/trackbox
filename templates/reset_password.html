{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
    :root {
        --primary: #2d6cdf;
        --glass: rgba(255, 255, 255, 0.95);
        --shadow: 0 15px 45px rgba(0, 0, 0, 0.1);
    }

    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
    }

    .reset-wrapper {
        min-height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .reset-card {
        background: var(--glass);
        backdrop-filter: blur(10px);
        width: 100%;
        max-width: 440px;
        padding: 45px 35px;
        border-radius: 28px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.2);
        animation: fadeIn 0.6s ease-out;
        text-align: center;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .header-icon {
        font-size: 3rem;
        color: var(--primary);
        margin-bottom: 20px;
    }

    .reset-card h2 {
        color: #1a1a1a;
        font-weight: 800;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
    }

    .reset-subtitle {
        font-size: 15px;
        color: #666;
        margin-bottom: 35px;
    }

    .form-group {
        margin-bottom: 22px;
        text-align: left;
    }

    .form-group label {
        display: block;
        font-size: 13px;
        color: #555;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i.field-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #aaa;
    }

    .input-wrapper input {
        width: 100%;
        padding: 14px 15px 14px 45px;
        border-radius: 12px;
        border: 1.5px solid #eee;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #fcfcfc;
    }

    .input-wrapper input:focus {
        border-color: var(--primary);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(45, 108, 223, 0.1);
        outline: none;
    }

    .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #888;
        padding: 5px;
    }

    .reset-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--primary), #4a8dfa);
        color: white;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(45, 108, 223, 0.3);
        transition: all 0.3s ease;
        margin-top: 10px;
    }

    .reset-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(45, 108, 223, 0.4);
    }
</style>

<div class="reset-wrapper">
    <div class="reset-card">
        <i class="fas fa-key header-icon"></i>
        <h2>Create New Password</h2>
        <p class="reset-subtitle">Set a strong password to secure your account</p>

        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock field-icon"></i>
                    <input name="password" type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePassword('password', this)"></i>
                </div>
                <small style="display: block; font-size: 10px; color: #777; margin-top: 5px; line-height: 1.2;">
                    Min. 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char.
                </small>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-shield-alt field-icon"></i>
                    <input name="confirm_password" type="password" id="confirm_password" placeholder="••••••••"
                        required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePassword('confirm_password', this)"></i>
                </div>
            </div>

            <button type="submit" class="reset-btn">Update Password</button>
        </form>
    </div>
</div>

<script>
    function togglePassword(fieldId, icon) {
        const input = document.getElementById(fieldId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        }
    }

    document.getElementById('resetForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;

        if (password !== confirm) {
            Swal.fire({
                icon: 'error',
                title: 'Mismatch',
                text: 'Passwords do not match!',
                confirmButtonColor: '#2d6cdf'
            });
            return;
        }

        const btn = e.target.querySelector('button');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

        const formData = new FormData(this);

        try {
            const response = await fetch(window.location.pathname, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Success!',
                    text: 'Your password has been reset successfully.',
                    confirmButtonColor: '#2d6cdf',
                    timer: 3000,
                    timerProgressBar: true
                }).then(() => {
                    window.location.href = '/login';
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Failed',
                    text: data.detail || 'Could not update password',
                    confirmButtonColor: '#2d6cdf'
                });
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        } catch (err) {
            console.error(err);
            Swal.fire({
                icon: 'error',
                title: 'Error',
                text: 'Something went wrong. Please try again.',
                confirmButtonColor: '#2d6cdf'
            });
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    });
</script>
{% endblock %}
