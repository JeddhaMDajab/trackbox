<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Verification | TrackBox EVSU Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #800000;
            --primary-dark: #5e0000;
            --accent: #FFCC00;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #6b7280;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --sidebar-width: 280px;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%); color: var(--white); position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 1000; }
        .sidebar-brand { padding: 30px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-brand img { height: 40px; }
        .sidebar-brand span { font-size: 1.4rem; font-weight: 800; }
        
        .sidebar nav { padding: 30px 0; flex-grow: 1; }
        .sidebar nav a { display: flex; align-items: center; gap: 15px; padding: 16px 30px; color: rgba(255, 255, 255, 0.7); text-decoration: none; font-weight: 500; transition: var(--transition); border-left: 4px solid transparent; }
        .sidebar nav a i { font-size: 1.2rem; width: 20px; text-align: center; }
        .sidebar nav a:hover { background: rgba(255, 255, 255, 0.05); color: var(--white); }
        .sidebar nav a.active { color: var(--white); background: rgba(255, 255, 255, 0.08); border-left-color: var(--accent); }
        .sidebar nav a.active i { color: var(--accent); }

        /* --- MAIN --- */
        .main { flex: 1; margin-left: var(--sidebar-width); padding: 40px; width: calc(100% - var(--sidebar-width)); display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 750px; }

        .header-box { text-align: center; margin-bottom: 40px; }
        .header-box h1 { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        .header-box p { color: var(--text-muted); font-size: 1rem; }

        /* --- SCANNER CARD --- */
        .scanner-card { background: var(--white); border-radius: 30px; box-shadow: var(--shadow); overflow: hidden; border: 1px solid #f0f0f0; margin-bottom: 40px; }
        .tabs { display: flex; background: #f8fafc; }
        .tab-btn { flex: 1; padding: 20px; border: none; background: transparent; font-family: inherit; font-weight: 700; font-size: 0.95rem; cursor: pointer; color: var(--text-muted); transition: var(--transition); border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); background: var(--white); border-bottom-color: var(--primary); }

        .scan-view { padding: 40px; }
        .scanner-frame { width: 100%; aspect-ratio: 1/1; background: #1a1a1a; border-radius: 20px; overflow: hidden; position: relative; border: 4px solid #333; }
        #scanner { width: 100% !important; height: 100% !important; }
        #scanner video { object-fit: cover !important; }

        .scan-line { position: absolute; width: 100%; height: 3px; background: var(--accent); top: 0; box-shadow: 0 0 15px var(--accent); animation: scan 3s linear infinite; display: none; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .upload-view { width: 100%; height: 350px; background: #f9fafb; border: 2px dashed #e5e7eb; border-radius: 24px; display: none; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); }
        .upload-view:hover { background: #fffbeb; border-color: var(--accent); }
        .upload-view i { font-size: 3.5rem; color: var(--primary); margin-bottom: 15px; }

        .btn-toggle { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 25px; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-start { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(128,0,0,0.15); }
        .btn-start:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-stop { background: #ef4444; color: white; display: none; }

        /* --- RESULTS --- */
        .res-card { background: var(--white); border-radius: 30px; padding: 40px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; display: none; animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .res-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; }
        .res-badge { padding: 8px 16px; border-radius: 100px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; }
        .status-lost { background: #fee2e2; color: #991b1b; }
        .status-found { background: #dcfce7; color: #166534; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .info-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .info-value { font-size: 1rem; font-weight: 600; color: var(--text-main); }

        .security-box { grid-column: span 2; background: #fffbeb; padding: 25px; border-radius: 20px; border: 1px solid #fef3c7; }
        .security-input { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #fde68a; margin-top: 15px; font-family: inherit; }

        .btn-confirm { background: var(--primary); color: white; padding: 16px; border-radius: 12px; border: none; width: 100%; font-weight: 800; font-size: 1rem; cursor: pointer; transition: var(--transition); }
        .btn-confirm:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-2px); }

        @media (max-width: 1024px) { 
            .sidebar { width: 85px; } 
            .sidebar-brand span, .sidebar nav a span { display: none; } 
            .sidebar-brand { justify-content: center; padding: 20px; }
            .sidebar nav a { justify-content: center; padding: 20px; }
            .main { margin-left: 85px; width: calc(100% - 85px); } 
        }

        @media (max-width: 768px) {
            .sidebar { left: -280px; width: 280px; transition: transform 0.3s ease; }
            .sidebar.active { transform: translateX(280px); left: 0; }
            .sidebar-brand span, .sidebar nav a span { display: flex; }
            .main { margin-left: 0; width: 100%; padding: 60px 20px 20px 20px; }
            .header-box h1 { font-size: 1.6rem; }
            .info-grid { grid-template-columns: 1fr; }
            .menu-toggle { display: block; position: fixed; top: 20px; left: 20px; z-index: 1100; background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; }
        }
        .menu-toggle { display: none; }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    <aside class="sidebar">
        <div class="sidebar-brand"><img src="/static/EVSU_logo.png" alt="EVSU"><span>TrackBox</span></div>
        <nav>
            <a href="/admin/dashboard"><i class="fas fa-chart-line"></i><span>Overview</span></a>
            <a href="javascript:void(0)" onclick="goTo('lost-items')"><i class="fas fa-search-location"></i><span>Lost Items</span></a>
            <a href="javascript:void(0)" onclick="goTo('found-items')"><i class="fas fa-box-open"></i><span>Found Items</span></a>
            <a href="javascript:void(0)" onclick="goTo('qr-scanner')" class="active"><i class="fas fa-qrcode"></i><span>QR Scanner</span></a>
        </nav>
        <a href="javascript:void(0)" onclick="handleLogout()" style="margin-top:auto; padding:25px 30px; color:#fca5a5; text-decoration:none; font-weight:600; display:flex; align-items:center; gap:12px; border-top:1px solid rgba(255,255,255,0.1);"><i class="fas fa-sign-out-alt"></i><span>Log Out</span></a>
    </aside>

    <main class="main">
        <div class="container">
            <div class="header-box">
                <h1>Verify Item Claim</h1>
                <p>Secure verification system for returning items to their rightful owners.</p>
            </div>

            <div class="scanner-card">
                <div class="scan-view">
                    <div class="scanner-frame" id="camView" style="display: block;">
                        <div class="scan-line" id="scanLine" style="display: none;"></div>
                        <div id="scanner"></div>
                        <div id="placeholder" style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:rgba(255,255,255,0.3);">
                            <i class="fas fa-camera" style="font-size:3rem; margin-bottom:15px;"></i>
                            <p>Camera standby</p>
                        </div>
                    </div>

                    <button class="btn-toggle btn-start" id="startBtn" onclick="startScanner()"><i class="fas fa-bolt"></i> Initialize Scanner</button>
                    <button class="btn-toggle btn-stop" id="stopBtn" onclick="stopScanner()" style="display:none;"><i class="fas fa-times"></i> Terminate Scanner</button>
                </div>
            </div>

            <div class="res-card" id="resCard">
                <div class="res-header">
                    <h2 style="font-weight:800; color:var(--primary);">Handover Verification</h2>
                    <div id="resBadge" class="res-badge"></div>
                </div>
                <div id="resBody" class="info-grid"></div>
                <div id="resFooter"></div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('active');
        }

        window.addEventListener('click', function(e) {
            const sidebar = document.querySelector('.sidebar');
            const toggle = document.querySelector('.menu-toggle');
            if (window.innerWidth <= 768 && sidebar && toggle &&
                !sidebar.contains(e.target) && !toggle.contains(e.target) && 
                sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
            }
        });

        const token = "{{ token }}";
        let html5QrCode = null;

        function goTo(s) { window.location.href = `/admin/${s}?token=${token}`; }
        
        function goTo(s) { window.location.href = `/admin/${s}?token=${token}`; }

        async function startScanner() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'flex';
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('scanLine').style.display = 'block';
            
            html5QrCode = new Html5Qrcode("scanner");

            // Optimized for reading QR codes from phone screens
            const config = { 
                fps: 10,
                qrbox: function(viewfinderWidth, viewfinderHeight) {
                    let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                    let scanBox = Math.floor(minEdge * 0.8);
                    return { width: scanBox, height: scanBox };
                },
                aspectRatio: 1.0,
                formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ],
                videoConstraints: {
                    facingMode: "environment",
                    advanced: [{ zoom: 1.0 }]
                }
            };
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    text => { 
                        stopScanner(); 
                        verifyQR(text); 
                    },
                    err => { /* ignore scan errors */ }
                );
            } catch (err) {
                console.error("Scanner failed to start", err);
                Swal.fire('Camera Error', 'Could not access camera. Please allow camera permissions.', 'error');
                stopScanner();
            }
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('startBtn').style.display = 'flex';
                    document.getElementById('stopBtn').style.display = 'none';
                    document.getElementById('placeholder').style.display = 'flex';
                    document.getElementById('scanLine').style.display = 'none';
                    html5QrCode = null;
                });
            }
        }

        async function processFile(input) {
            if (!input.files[0]) return;
            Swal.fire({ title: 'Decoding QR...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const decoded = await (new Html5Qrcode("scanner")).scanFile(input.files[0], true);
                Swal.close(); verifyQR(decoded);
            } catch (e) { Swal.fire('Error', 'No valid QR code found in image.', 'error'); }
            finally { input.value = ''; }
        }

        async function verifyQR(text) {
            const fd = new FormData(); fd.append('token', token); fd.append('qr_data', text);
            const res = await fetch('/admin/verify-qr', { method: 'POST', body: fd });
            const data = await res.json();

            if (!data.success) { Swal.fire('Invalid Code', data.message, 'error'); return; }
            
            const item = data.item;
            const badge = document.getElementById('resBadge');
            badge.className = `res-badge status-${item.type.toLowerCase()}`;
            badge.innerText = item.type;

            let bodyHtml = `
                <div class="info-item"><div class="info-label">Item Name</div><div class="info-value">${item.item_name}</div></div>
                <div class="info-item"><div class="info-label">Category</div><div class="info-value">${item.category}</div></div>
                <div class="info-item"><div class="info-label">Reporter</div><div class="info-value">${item.reporter}</div></div>
                <div class="info-item"><div class="info-label">Date</div><div class="info-value">${item.reported_at.split(' ')[0]}</div></div>
            `;

            if (item.security_question) {
                bodyHtml += `<div class="security-box"><div class="info-label" style="color:var(--primary);"><i class="fas fa-lock"></i> Ownership Challenge</div><div class="info-value" style="margin-top:5px;">${item.security_question}</div><input type="text" id="secAns" class="security-input" placeholder="Owner's answer..."><button onclick="checkAns('${item.security_answer}')" id="vBtn" style="margin-top:10px; background:var(--accent); color:var(--primary); border:none; padding:8px 15px; border-radius:8px; font-weight:700; cursor:pointer;">Verify Challenge</button></div>`;
            }

            document.getElementById('resBody').innerHTML = bodyHtml;
            
            let footer = '';
            if (!item.is_claimed) {
                const disabled = item.security_question ? 'disabled style="opacity:0.5;"' : '';
                footer = `<button class="btn-confirm" id="cBtn" ${disabled} onclick="markClaimed(${item.id})">✅ Complete Handover</button>`;
            } else {
                footer = `<div style="text-align:center; color:var(--success); font-weight:800; border:2px dashed var(--success); padding:15px; border-radius:12px;">ITEM ALREADY RETURNED</div>`;
            }

            document.getElementById('resFooter').innerHTML = footer;
            document.getElementById('resCard').style.display = 'block';
            document.getElementById('resCard').scrollIntoView({ behavior: 'smooth' });
        }

        function checkAns(correct) {
            if (document.getElementById('secAns').value.toLowerCase().trim() === correct.toLowerCase().trim()) {
                Swal.fire('Identity Verified', 'Ownership confirmed.', 'success');
                const b = document.getElementById('cBtn'); b.disabled = false; b.style.opacity = '1';
                document.getElementById('vBtn').style.display = 'none';
            } else { Swal.fire('Verification Failed', 'Answer does not match record.', 'error'); }
        }

        async function markClaimed(id) {
            const fd = new FormData(); fd.append('token', token); fd.append('item_id', id);
            const res = await fetch('/admin/mark-claimed', { method: 'POST', body: fd });
            if ((await res.json()).success) { Swal.fire('Handover Complete', 'Inventory updated successfully.', 'success').then(() => location.reload()); }
        }

        function handleLogout() { Swal.fire({ title: 'Log Out?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#800000', confirmButtonText: 'Exit' }).then((r) => { if (r.isConfirmed) window.location.href = "/logout"; }); }
    </script>
</body>
</html>
