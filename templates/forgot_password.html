<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account Recovery - EVSU TrackBox</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #800000; /* EVSU Maroon */
            --primary-dark: #5e0000;
            --accent: #FFCC00;  /* EVSU Gold */
            --bg-light: #F9F9F9;
            --text-dark: #1a1a1a;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--white);
            height: 100vh;
            overflow: hidden;
        }

        .split-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* --- LEFT COLUMN --- */
        .visual-column {
            flex: 0.5;
            background-color: var(--primary);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative Shield Icon in Background */
        .visual-column::before {
            content: '\f3ed'; /* Shield icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            bottom: -50px;
            right: -50px;
            font-size: 30rem;
            opacity: 0.03;
            z-index: 1;
        }

        .visual-content {
            position: relative;
            z-index: 2;
            max-width: 500px;
            animation: slideInLeft 0.8s ease-out;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .visual-content h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
            letter-spacing: -1.5px;
        }

        .visual-content p {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
            line-height: 1.6;
        }

        /* --- RIGHT COLUMN --- */
        .form-column {
            flex: 0.5;
            background-color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .recovery-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .recovery-box h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .recovery-box p.subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            color: #444;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 15px 16px 45px;
            border-radius: 15px;
            border: 2px solid #f0f0f0;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            background: #fafafa;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(128, 0, 0, 0.05);
        }

        .reset-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: var(--accent);
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(128, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(128, 0, 0, 0.3);
            color: #ffdb4d;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            font-size: 0.95rem;
            color: #777;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .back-link i {
            margin-right: 8px;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--primary);
        }

        .back-link:hover i {
            transform: translateX(-5px);
        }

        /* --- RESPONSIVENESS --- */
        @media (max-width: 1024px) {
            .visual-column { padding: 40px; }
            .visual-content h1 { font-size: 2.5rem; }
        }

        @media (max-width: 768px) {
            .visual-column { display: none; }
            .form-column { flex: 1; padding: 30px; }
            body { overflow: auto; }
        }
    </style>
</head>
<body>

    <div class="split-wrapper">
        <!-- LEFT COLUMN -->
        <div class="visual-column">
            <div class="visual-content">
                <h1>Account<br>Recovery</h1>
                <p>Don't worry, it happens to the best of us. Just provide your official EVSU email and we'll help you get back into your account.</p>
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="form-column">
            <div class="recovery-box">
                <i class="fas fa-envelope-open-text header-icon"></i>
                <h2>Reset Password</h2>
                <p class="subtitle">Securely recover your TrackBox access</p>

                <form id="forgotForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-at"></i>
                            <input name="email" type="email" placeholder="yourname@evsu.edu.ph" required autofocus>
                        </div>
                    </div>

                    <button type="submit" class="reset-btn">
                        <span>Send Reset Link</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>

                <a href="/login" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';

            const formData = new FormData(this);

            try {
                const response = await fetch('/forgot-password', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Email Sent!',
                        text: data.detail || 'A password reset link has been sent to your email address.',
                        confirmButtonColor: '#800000',
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Not Found',
                        text: data.detail || 'Could not send reset link.',
                        confirmButtonColor: '#800000'
                    });
                }
            } catch (err) {
                console.error(err);
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Something went wrong. Please try again.',
                    confirmButtonColor: '#800000'
                });
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        });
    </script>
</body>
</html>
