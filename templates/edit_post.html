<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Report | TrackBox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #2d6cdf;
            --primary-dark: #1e57a0;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .current-img {
            margin: 10px 0;
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-back {
            background: transparent;
            color: var(--text-muted);
            text-decoration: none;
            text-align: center;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Edit Report</h2>
        <form action="/edit_post/{{ post.id }}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="type" value="{{ post.type }}">

            <div class="form-group">
                <label>Item Name</label>
                <input type="text" name="title" value="{{ post.item_name or post.title }}" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" required>{{ post.description }}</textarea>
            </div>

            <div class="form-group">
                <label>Update Image</label>
                <input type="file" name="image" accept="image/*">
                {% if post.image %}
                <p style="font-size: 0.8rem; margin-bottom: 4px;">Current Image:</p>
                <img src="/uploads/{{ post.image }}" class="current-img">
                {% endif %}
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/user_account" class="btn-back">Cancel Changes</a>
        </form>
    </div>

    <script>
        {% if success %}
        Swal.fire({
            icon: 'success',
            title: 'Updated',
            text: '{{ success }}',
            confirmButtonColor: '#2d6cdf'
        });
        {% endif %}

        {% if error %}
        Swal.fire({
            icon: 'error',
            title: 'Error',
            text: '{{ error }}',
            confirmButtonColor: '#2d6cdf'
        });
        {% endif %}
    </script>
</body>

</html>
